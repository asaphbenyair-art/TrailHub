<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="עמיתים לטיולים">
  <defs>
    <linearGradient id="am-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6fa8"/>
      <stop offset="1" stop-color="#1c4d7a"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#245a8a" stroke-width="3"/>
  <!-- winding trail -->
  <path d="M26 96 Q52 82 46 64 Q40 48 66 40 Q92 34 90 20" fill="none" stroke="#4a90c2" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 11"/>
  <!-- two hikers -->
  <g fill="url(#am-sky)">
    <circle cx="48" cy="52" r="6"/>
    <path d="M48 58 L44 76 L52 76 Z"/>
    <line x1="40" y1="66" x2="56" y2="62" stroke="#2f6fa8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g fill="#4a90c2">
    <circle cx="68" cy="46" r="6"/>
    <path d="M68 52 L64 70 L72 70 Z"/>
    <line x1="60" y1="60" x2="76" y2="56" stroke="#4a90c2" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- letters עט -->
  <text x="60" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#2f6fa8" letter-spacing="2">עט</text>
</svg>
